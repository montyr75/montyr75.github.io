<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baby Tools</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .glow-card {
            transition: all 0.3s ease-in-out;
        }

        .glow-card:hover {
            box-shadow: 0 10px 40px -10px rgba(99, 102, 241, 0.4);
            transform: translateY(-2px);
        }

        .glow-card.cyan:hover {
            box-shadow: 0 10px 40px -10px rgba(6, 182, 212, 0.4);
        }
    </style>
</head>

<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col items-center justify-center p-6">

    <!-- Header / Logo -->
    <div class="mb-14 text-center">
        <!-- SVG Logo Container -->
        <div
            class="inline-flex items-center justify-center w-24 h-24 bg-slate-800 rounded-full border border-indigo-500/30 shadow-[0_0_30px_rgba(99,102,241,0.2)] mb-6">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-indigo-400" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <!-- A simple abstract stroller or parent/baby icon -->
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                    d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
            </svg>
        </div>
        <h1
            class="text-4xl sm:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-cyan-400 tracking-tight">
            Baby Tools
        </h1>
    </div>

    <!-- Actions Container -->
    <div class="w-full max-w-lg space-y-5">

        <!-- Weight Converter Button -->
        <a href="weight_converter.html" class="block group">
            <div
                class="bg-slate-800 rounded-2xl p-6 flex items-center border border-slate-700 glow-card relative overflow-hidden">
                <div
                    class="absolute inset-0 bg-gradient-to-r from-indigo-500/10 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                </div>

                <div
                    class="bg-indigo-500/10 p-4 rounded-xl mr-6 border border-indigo-500/20 group-hover:scale-110 transition-transform duration-300 z-10">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-indigo-400" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M3 6l3 1m0 0l-3 9a5.002 5.002 0 006.001 0M6 7l3 9M6 7l6-2m6 2l3-1m-3 1l-3 9a5.002 5.002 0 006.001 0M18 7l3 9m-3-9l-6-2m0-2v2m0 16V5m0 16H9m3 0h3" />
                    </svg>
                </div>
                <div class="z-10">
                    <h2 class="text-xl font-bold text-slate-100 group-hover:text-indigo-300 transition-colors">Weight
                        Converter</h2>
                    <p class="text-slate-400 mt-1">Convert grams to pounds & ounces</p>
                </div>
                <div
                    class="ml-auto opacity-50 group-hover:opacity-100 group-hover:translate-x-1 group-hover:text-indigo-400 transition-all duration-300 z-10">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                    </svg>
                </div>
            </div>
        </a>

        <!-- Date Calculator Button -->
        <a href="date_calc.html" class="block group">
            <div
                class="bg-slate-800 rounded-2xl p-6 flex items-center border border-slate-700 glow-card cyan relative overflow-hidden">
                <div
                    class="absolute inset-0 bg-gradient-to-r from-cyan-500/10 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                </div>

                <div
                    class="bg-cyan-500/10 p-4 rounded-xl mr-6 border border-cyan-500/20 group-hover:scale-110 transition-transform duration-300 z-10">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-cyan-400" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                    </svg>
                </div>
                <div class="z-10">
                    <h2 class="text-xl font-bold text-slate-100 group-hover:text-cyan-300 transition-colors">Date
                        Calculator</h2>
                    <p class="text-slate-400 mt-1">Calculate milestones from a date</p>
                </div>
                <div
                    class="ml-auto opacity-50 group-hover:opacity-100 group-hover:translate-x-1 group-hover:text-cyan-400 transition-all duration-300 z-10">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                    </svg>
                </div>
            </div>
        </a>

    </div>

</body>

</html>
